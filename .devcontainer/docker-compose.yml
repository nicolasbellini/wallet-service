services:
  app:
    image: mcr.microsoft.com/devcontainers/java:1-21-bullseye
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/walletdb
      DB_USERNAME: wallet_service
      DB_PASSWORD: wallet_service
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: walletdb
      POSTGRES_USER: wallet_service
      POSTGRES_PASSWORD: wallet_service
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet_service -d walletdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
