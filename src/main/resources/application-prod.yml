# Production profile pointing at Postgres. Activate with:
# --spring.profiles.active=prod (or SPRING_PROFILES_ACTIVE=prod)
# The .devcontainer/GitHub Codespaces setup activates this automatically
# against a real Postgres container - see .devcontainer/docker-compose.yml.
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/walletdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:wallet_service}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
