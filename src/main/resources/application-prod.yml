# Example production profile pointing at Postgres.
# Activate with: --spring.profiles.active=prod
# Requires adding the Postgres JDBC driver dependency (see README) since the
# default build only ships H2 for the dev/test profile.
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/walletdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:wallet_service}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
